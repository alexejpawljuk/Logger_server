events {}

http {
    # Distribute WebSocket connections across LogServer instances
    upstream log_servers {
        server log-server-1:8080;
        server log-server-2:8080;
        server log-server-3:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://log_servers;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}