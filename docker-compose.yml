name: distributed-logger

services:
  writer-server:
    image: distributed-logger:latest
    build: .
    command: node dist/writer-server/index.js
    restart: unless-stopped
    environment:
      WRITER_SERVER_PORT: 8090
      WRITER_SERVER_HOST: 0.0.0.0
      LOG_FILE_PATH: /app/logs/app.log
      LOG_MAX_SIZE: 1048576
    volumes:
      - logs-data:/app/logs
    healthcheck:
      test: [ "CMD", "node", "-e", "const net = require('net'); const socket = net.connect(8090, '127.0.0.1', () => process.exit(0)); socket.on('error', () => process.exit(1));" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  log-server-1:
    image: distributed-logger:latest
    command: node dist/log-server/index.js
    restart: unless-stopped
    environment:
      LOG_SERVER_PORT: 8080
      LOG_SERVER_HOST: 0.0.0.0
      WRITER_SERVER_URL: ws://writer-server:8090
    depends_on:
      writer-server:
        condition: service_healthy

  log-server-2:
    image: distributed-logger:latest
    command: node dist/log-server/index.js
    restart: unless-stopped
    environment:
      LOG_SERVER_PORT: 8080
      LOG_SERVER_HOST: 0.0.0.0
      WRITER_SERVER_URL: ws://writer-server:8090
    depends_on:
      writer-server:
        condition: service_healthy

  log-server-3:
    image: distributed-logger:latest
    command: node dist/log-server/index.js
    restart: unless-stopped
    environment:
      LOG_SERVER_PORT: 8080
      LOG_SERVER_HOST: 0.0.0.0
      WRITER_SERVER_URL: ws://writer-server:8090
    depends_on:
      writer-server:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - log-server-1
      - log-server-2
      - log-server-3

volumes:
  logs-data: